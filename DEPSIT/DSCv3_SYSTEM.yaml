  - name: Use Windows PowerShell resources
    type: Microsoft.Windows/WindowsPowerShell
    properties:
      resources:
        - name: Microsoft SQL Express via chocolatey
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              New-Item -Path "c:\temp\myfile.txt" -ItemType File -Force
              # Refresh PATH so choco is available
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
              # Install SQL server Express via Chocolatey
              choco install sql-server-express -y

        - name: Microsoft VisualStudio Locator via chocolatey
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              # Refresh PATH so choco is available
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
              # Install Microsoft VisualStudio Locator via Chocolatey
              choco install vswhere -y

        - name: Python 3.12 via chocolatey
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              New-Item -Path "c:\temp\myfile.txt" -ItemType File -Force
              # Refresh PATH so choco is available
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
              # Install Python 3.12 via Chocolatey
              choco install python --version=3.12.10 -y

        - name: vs2026 workloads
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              # Define Visual Studio Installer paths as variables
              $vsInstallerDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer"
              $vsInstallerExe = Join-Path $vsInstallerDir "vs_installer.exe"
              $productId= "Microsoft.VisualStudio.Product.Enterprise"
              $channelId= "VisualStudio.18.Release"
              # Install Visual Studio 2026 ManagedDesktop & Netweb workloads
              $process = Start-Process `
                -FilePath $vsInstallerExe `
                -ArgumentList `
                    "modify", `
                    "--productId", $productId, `
                    "--channelId", $channelId, `
                    "--add", "Microsoft.VisualStudio.Workload.ManagedDesktop" , `
                    "--add", "Microsoft.VisualStudio.Workload.NetWeb" , `
                    "--includeRecommended", `
                    "--quiet", `
                    "--norestart" `
                -NoNewWindow `
                -PassThru `
                -Wait

        - name: vs2022 workloads
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              # Define Visual Studio Installer paths as variables
              $vsInstallerDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer"
              $vsInstallerExe = Join-Path $vsInstallerDir "vs_installer.exe"
              $productId= "Microsoft.VisualStudio.Product.Enterprise"
              $channelId= "VisualStudio.17.Release"
              # Install Visual Studio 2022 ManagedDesktop & Netweb workloads
              $process = Start-Process `
                -FilePath $vsInstallerExe `
                -ArgumentList `
                    "modify", `
                    "--productId", $productId, `
                    "--channelId", $channelId, `
                    "--add", "Microsoft.VisualStudio.Workload.ManagedDesktop" , `
                    "--add", "Microsoft.VisualStudio.Workload.NetWeb" , `
                    "--includeRecommended", `
                    "--quiet", `
                    "--norestart" `
                -NoNewWindow `
                -PassThru `
                -Wait
                
        - name: reboot
          type: PSDesiredStateConfiguration/Script
          properties:
            GetScript: |
              @{Result=$true}
            TestScript:  |
              $false
            SetScript: |
              # reboot machine
              shutdown /r /t 60 /f       
